apiVersion: v1
kind: Service
metadata:
  name: {{ include "insurguard.fullname" . }}-etcd
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 2379
      targetPort: client
      name: client
  selector:
    app.kubernetes.io/name: etcd
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "insurguard.fullname" . }}-etcd
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
    app.kubernetes.io/name: etcd
spec:
  serviceName: {{ include "insurguard.fullname" . }}-etcd
  replicas: {{ .Values.etcd.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: etcd
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: etcd
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        {{- include "insurguard.securityContext" . | nindent 8 }}
      containers:
        - name: etcd
          image: {{ .Values.etcd.image }}
          securityContext:
            {{- include "insurguard.containerSecurityContext" . | nindent 12 }}
          command:
            - etcd
            - -advertise-client-urls=http://127.0.0.1:2379
            - -listen-client-urls
            - http://0.0.0.0:2379
            - --data-dir
            - /etcd
          env:
            {{- range $key, $val := .Values.etcd.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          ports:
            - containerPort: 2379
              name: client
          volumeMounts:
            - name: data
              mountPath: /etcd
          livenessProbe:
            exec:
              command: [ "etcdctl", "endpoint", "health" ]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ ReadWriteOnce ]
        {{- if .Values.storageClass }}
        storageClassName: {{ .Values.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.etcd.pvcSize }}
