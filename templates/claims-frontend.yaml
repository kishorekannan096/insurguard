apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "insurguard.fullname" . }}-claims-frontend-nginx
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
data:
  default.conf: |
    upstream claims-backend {
        server {{ include "insurguard.fullname" . }}-claims-backend:{{ .Values.claimsBackend.port }};
    }

    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://claims-backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            client_max_body_size 50m;
        }

        location /uploads/ {
            proxy_pass http://claims-backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insurguard.fullname" . }}-claims-frontend
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
    app.kubernetes.io/name: claims-frontend
spec:
  replicas: {{ .Values.claimsFrontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: claims-frontend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claims-frontend
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- include "insurguard.gpuNodeSelector" . | nindent 6 }}
      securityContext:
        {{- include "insurguard.securityContext" . | nindent 8 }}
      containers:
        - name: claims-frontend
          image: {{ .Values.claimsFrontend.image }}
          securityContext:
            {{- include "insurguard.containerSecurityContext" . | nindent 12 }}
          env:
            - name: VITE_BACKEND_URL
              value: "http://{{ include "insurguard.fullname" . }}-claims-backend:{{ .Values.claimsBackend.port }}"
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "insurguard.fullname" . }}-claims-frontend-nginx
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "insurguard.fullname" . }}-claims-frontend
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.claimsFrontend.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: claims-frontend
    app.kubernetes.io/instance: {{ .Release.Name }}
