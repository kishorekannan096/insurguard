apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "insurguard.fullname" . }}-admin-dashboard-nginx
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
data:
  default.conf.template: |
    upstream claims-backend {
        server {{ include "insurguard.fullname" . }}-claims-backend:{{ .Values.claimsBackend.port }};
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://claims-backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            client_max_body_size 50m;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insurguard.fullname" . }}-admin-dashboard
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
    app.kubernetes.io/name: admin-dashboard
spec:
  replicas: {{ .Values.adminDashboard.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: admin-dashboard
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: admin-dashboard
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        {{- include "insurguard.securityContext" . | nindent 8 }}
      containers:
        - name: admin-dashboard
          image: {{ .Values.adminDashboard.image }}
          securityContext:
            {{- include "insurguard.containerSecurityContext" . | nindent 12 }}
          env:
            - name: VITE_BACKEND_URL
              value: "http://{{ include "insurguard.fullname" . }}-claims-backend:{{ .Values.claimsBackend.port }}"
          ports:
            - containerPort: {{ .Values.adminDashboard.port }}
              name: http
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/templates
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "insurguard.fullname" . }}-admin-dashboard-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "insurguard.fullname" . }}-admin-dashboard
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.adminDashboard.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: admin-dashboard
    app.kubernetes.io/instance: {{ .Release.Name }}
