apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insureguard.fullname" . }}-kyc-verifier
  labels:
    {{- include "insureguard.labels" . | nindent 4 }}
    app.kubernetes.io/name: kyc-verifier
spec:
  replicas: {{ .Values.kycVerifier.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: kyc-verifier
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kyc-verifier
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        {{- include "insureguard.securityContext" . | nindent 8 }}
      containers:
        - name: kyc-verifier
          image: {{ .Values.kycVerifier.image }}
          securityContext:
            {{- include "insureguard.containerSecurityContext" . | nindent 12 }}
          env:
            - name: POSTGRES_URL
              value: "postgresql+asyncpg://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@{{ include "insureguard.fullname" . }}-postgres:{{ .Values.postgres.port }}/kyc_db"
            - name: MILVUS_HOST
              value: {{ include "insureguard.fullname" . }}-milvus
            - name: MILVUS_PORT
              value: {{ .Values.milvus.port | quote }}
            - name: OCR_URL
              value: "http://{{ include "insureguard.fullname" . }}-nemoretriever-parser:{{ .Values.nemoretrieverParser.port }}/v1/chat/completions"
            - name: LLM_URL
              value: "http://{{ include "insureguard.fullname" . }}-llama-parser:{{ .Values.llamaParser.port }}/v1/chat/completions"
            - name: ANTISPOOF_URL
              value: "http://{{ include "insureguard.fullname" . }}-face-embedding-api:{{ .Values.faceEmbeddingApi.port }}/embed"
            - name: MINIO_ENDPOINT
              value: "{{ include "insureguard.fullname" . }}-minio:{{ .Values.minio.apiPort }}"
            - name: MINIO_ACCESS_KEY
              value: {{ .Values.minio.accessKey | quote }}
            - name: MINIO_SECRET_KEY
              value: {{ .Values.minio.secretKey | quote }}
            {{- range $key, $val := .Values.kycVerifier.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.kycVerifier.port }}
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "insureguard.fullname" . }}-kyc-verifier
  labels:
    {{- include "insureguard.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.kycVerifier.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: kyc-verifier
    app.kubernetes.io/instance: {{ .Release.Name }}
