{{- if .Values.routes.claimsFrontend.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "insureguard.fullname" . }}-claims-frontend
  labels:
    {{- include "insureguard.labels" . | nindent 4 }}
spec:
  {{- if .Values.routes.claimsFrontend.host }}
  host: {{ .Values.routes.claimsFrontend.host }}
  {{- end }}
  to:
    kind: Service
    name: {{ include "insureguard.fullname" . }}-claims-frontend
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
