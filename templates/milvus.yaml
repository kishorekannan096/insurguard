apiVersion: v1
kind: Service
metadata:
  name: {{ include "insurguard.fullname" . }}-milvus
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.milvus.port }}
      targetPort: grpc
      name: grpc
    - port: {{ .Values.milvus.metricsPort }}
      targetPort: metrics
      name: metrics
  selector:
    app.kubernetes.io/name: milvus
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "insurguard.fullname" . }}-milvus
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
    app.kubernetes.io/name: milvus
spec:
  serviceName: {{ include "insurguard.fullname" . }}-milvus
  replicas: {{ .Values.milvus.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: milvus
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: milvus
        app.kubernetes.io/instance: {{ .Release.Name }}
        insurguard/gpu-workload: "true"
    spec:
      {{- include "insurguard.gpuTopologySpread" . | nindent 6 }}
      securityContext:
        {{- include "insurguard.securityContext" . | nindent 8 }}
      containers:
        - name: milvus
          image: {{ .Values.milvus.image }}
          securityContext:
            {{- include "insurguard.containerSecurityContext" . | nindent 12 }}
          command: [ "milvus", "run", "standalone" ]
          env:
            - name: ETCD_ENDPOINTS
              value: "{{ include "insurguard.fullname" . }}-etcd:2379"
            - name: MINIO_ADDRESS
              value: "{{ include "insurguard.fullname" . }}-minio:{{ .Values.minio.apiPort }}"
            - name: KNOWHERE_GPU_MEM_POOL_SIZE
              value: {{ .Values.milvus.gpuMemPoolSize | quote }}
          ports:
            - containerPort: {{ .Values.milvus.port }}
              name: grpc
            - containerPort: {{ .Values.milvus.metricsPort }}
              name: metrics
          volumeMounts:
            - name: data
              mountPath: /var/lib/milvus
          resources:
            limits:
              nvidia.com/gpu: {{ .Values.milvus.gpu | quote }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ ReadWriteOnce ]
        resources:
          requests:
            storage: {{ .Values.milvus.pvcSize }}
