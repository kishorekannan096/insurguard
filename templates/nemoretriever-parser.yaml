apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insurguard.fullname" . }}-nemoretriever-parser
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
    app.kubernetes.io/name: nemoretriever-parser
spec:
  replicas: {{ .Values.nemoretrieverParser.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: nemoretriever-parser
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nemoretriever-parser
        app.kubernetes.io/instance: {{ .Release.Name }}
        insurguard/gpu-workload: "true"
        insurguard/nim-heavy: "true"
    spec:
      {{- include "insurguard.gpuTopologySpread" . | nindent 6 }}
      {{- include "insurguard.nimAntiAffinity" (dict "component" "nemoretriever-parser" "Release" .Release) | nindent 6 }}
      securityContext:
        {{- include "insurguard.securityContext" . | nindent 8 }}
      imagePullSecrets:
        - name: {{ include "insurguard.imagePullSecretName" . }}
      containers:
        - name: nemoretriever-parser
          image: {{ .Values.nemoretrieverParser.image }}
          securityContext:
            {{- include "insurguard.containerSecurityContext" . | nindent 12 }}
          env:
            {{- range $key, $val := .Values.nemoretrieverParser.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "insurguard.nvidiaSecretName" . }}
                  key: NVIDIA_API_KEY
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "insurguard.nvidiaSecretName" . }}
                  key: NGC_API_KEY
          ports:
            - containerPort: {{ .Values.nemoretrieverParser.port }}
              name: http
          volumeMounts:
            - name: nim-cache
              mountPath: /opt/nim/.cache
            - name: dshm
              mountPath: /dev/shm
          resources:
            limits:
              nvidia.com/gpu: {{ .Values.nemoretrieverParser.gpu | quote }}
      volumes:
        - name: nim-cache
          emptyDir: {}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.nemoretrieverParser.shmSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "insurguard.fullname" . }}-nemoretriever-parser
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.nemoretrieverParser.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: nemoretriever-parser
    app.kubernetes.io/instance: {{ .Release.Name }}
