apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insurguard.fullname" . }}-claims-backend
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
    app.kubernetes.io/name: claims-backend
spec:
  replicas: {{ .Values.claimsBackend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: claims-backend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claims-backend
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        {{- include "insurguard.securityContext" . | nindent 8 }}
      containers:
        - name: claims-backend
          image: {{ .Values.claimsBackend.image }}
          securityContext:
            {{- include "insurguard.containerSecurityContext" . | nindent 12 }}
          env:
            # Database
            - name: DATABASE_URL
              value: postgresql+asyncpg://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@{{ include "insurguard.fullname" . }}-postgres:{{ .Values.postgres.port }}/claims_db
            # KYC Service
            - name: KYC_VERIFIER_URL
              value: http://{{ include "insurguard.fullname" . }}-kyc-verifier:{{ .Values.kycVerifier.port }}
            # AI Services
            - name: HIVE_AI_URL
              value: http://{{ include "insurguard.fullname" . }}-hive-ai-detection:{{ .Values.hiveAiDetection.port }}
            - name: NEMOTRON_VLM_URL
              value: http://{{ include "insurguard.fullname" . }}-nemotron-vlm:{{ .Values.nemotronVlm.port }}
            - name: NVCLIP_URL
              value: http://{{ include "insurguard.fullname" . }}-nvclip:{{ .Values.nvclip.port }}
            - name: LLM_DECISION_URL
              value: http://{{ include "insurguard.fullname" . }}-llama-parser:{{ .Values.llamaParser.port }}
            # Milvus
            - name: MILVUS_HOST
              value: {{ include "insurguard.fullname" . }}-milvus
            - name: MILVUS_PORT
              value: {{ .Values.milvus.port | quote }}
            # MinIO
            - name: MINIO_ENDPOINT
              value: {{ include "insurguard.fullname" . }}-minio:{{ .Values.minio.apiPort }}
            - name: MINIO_ACCESS_KEY
              value: {{ .Values.minio.accessKey | quote }}
            - name: MINIO_SECRET_KEY
              value: {{ .Values.minio.secretKey | quote }}
            # Forgery Detection
            - name: FORGERY_DETECTION_API_URL
              value: http://{{ include "insurguard.fullname" . }}-forgery-detection-api:{{ .Values.forgeryDetectionApi.port }}
            # LLM Model
            - name: LLM_MODEL
              value: {{ .Values.llmModel | quote }}
            {{- range $key, $val := .Values.claimsBackend.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.claimsBackend.port }}
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "insurguard.fullname" . }}-claims-backend
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.claimsBackend.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: claims-backend
    app.kubernetes.io/instance: {{ .Release.Name }}
