apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insureguard.fullname" . }}-forgery-detection-api
  labels:
    {{- include "insureguard.labels" . | nindent 4 }}
    app.kubernetes.io/name: forgery-detection-api
spec:
  replicas: {{ .Values.forgeryDetectionApi.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: forgery-detection-api
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgery-detection-api
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        {{- include "insureguard.securityContext" . | nindent 8 }}
      containers:
        - name: forgery-detection-api
          image: {{ .Values.forgeryDetectionApi.image }}
          securityContext:
            {{- include "insureguard.containerSecurityContext" . | nindent 12 }}
          env:
            {{- range $key, $val := .Values.forgeryDetectionApi.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "insureguard.nvidiaSecretName" . }}
                  key: NVIDIA_API_KEY
          ports:
            - containerPort: {{ .Values.forgeryDetectionApi.port }}
              name: http
          resources:
            limits:
              nvidia.com/gpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "insureguard.fullname" . }}-forgery-detection-api
  labels:
    {{- include "insureguard.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.forgeryDetectionApi.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: forgery-detection-api
    app.kubernetes.io/instance: {{ .Release.Name }}
