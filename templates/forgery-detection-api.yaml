apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insurguard.fullname" . }}-forgery-detection-api
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
    app.kubernetes.io/name: forgery-detection-api
spec:
  replicas: {{ .Values.forgeryDetectionApi.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: forgery-detection-api
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgery-detection-api
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        {{- include "insurguard.securityContext" . | nindent 8 }}
      containers:
        - name: forgery-detection-api
          image: {{ .Values.forgeryDetectionApi.image }}
          securityContext:
            {{- include "insurguard.containerSecurityContext" . | nindent 12 }}
          env:
            - name: HIVE_AI_URL
              value: "http://{{ include "insurguard.fullname" . }}-hive-ai-detection:{{ .Values.hiveAiDetection.port }}"
            {{- range $key, $val := .Values.forgeryDetectionApi.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "insurguard.nvidiaSecretName" . }}
                  key: NVIDIA_API_KEY
            - name: HF_HOME
              value: /tmp/hf_cache
            - name: TRANSFORMERS_CACHE
              value: /tmp/hf_cache
          ports:
            - containerPort: {{ .Values.forgeryDetectionApi.port }}
              name: http
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
          resources:
            limits:
              nvidia.com/gpu: {{ .Values.forgeryDetectionApi.gpu | quote }}
      volumes:
        - name: tmp-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "insurguard.fullname" . }}-forgery-detection-api
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.forgeryDetectionApi.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: forgery-detection-api
    app.kubernetes.io/instance: {{ .Release.Name }}
