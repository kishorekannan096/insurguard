apiVersion: v1
kind: Service
metadata:
  name: {{ include "insurguard.fullname" . }}-minio
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.minio.apiPort }}
      targetPort: api
      name: api
    - port: {{ .Values.minio.consolePort }}
      targetPort: console
      name: console
  selector:
    app.kubernetes.io/name: minio
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "insurguard.fullname" . }}-minio
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
    app.kubernetes.io/name: minio
spec:
  serviceName: {{ include "insurguard.fullname" . }}-minio
  replicas: {{ .Values.minio.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        {{- include "insurguard.securityContext" . | nindent 8 }}
      containers:
        - name: minio
          image: {{ .Values.minio.image }}
          securityContext:
            {{- include "insurguard.containerSecurityContext" . | nindent 12 }}
          command:
            - minio
            - server
            - /minio_data
            - --console-address
            - ":{{ .Values.minio.consolePort }}"
            - --address
            - ":{{ .Values.minio.apiPort }}"
          env:
            - name: MINIO_ACCESS_KEY
              value: {{ .Values.minio.accessKey | quote }}
            - name: MINIO_SECRET_KEY
              value: {{ .Values.minio.secretKey | quote }}
          ports:
            - containerPort: {{ .Values.minio.apiPort }}
              name: api
            - containerPort: {{ .Values.minio.consolePort }}
              name: console
          volumeMounts:
            - name: data
              mountPath: /minio_data
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ ReadWriteOnce ]
        resources:
          requests:
            storage: {{ .Values.minio.pvcSize }}
