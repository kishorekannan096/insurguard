apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insurguard.fullname" . }}-hive-ai-detection
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
    app.kubernetes.io/name: hive-ai-detection
spec:
  replicas: {{ .Values.hiveAiDetection.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: hive-ai-detection
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hive-ai-detection
        app.kubernetes.io/instance: {{ .Release.Name }}
        insurguard/gpu-workload: "true"
    spec:
      {{- include "insurguard.gpuTopologySpread" . | nindent 6 }}
      {{- include "insurguard.gpuNodeSelector" . | nindent 6 }}
      securityContext:
        {{- include "insurguard.securityContext" . | nindent 8 }}
      containers:
        - name: hive-ai-detection
          image: {{ .Values.hiveAiDetection.image }}
          securityContext:
            {{- include "insurguard.containerSecurityContext" . | nindent 12 }}
          env:
            {{- range $key, $val := .Values.hiveAiDetection.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: HF_HOME
              value: /tmp/hf_cache
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: "max_split_size_mb:128"
          ports:
            - containerPort: {{ .Values.hiveAiDetection.port }}
              name: http
          volumeMounts:
            - name: hf-cache
              mountPath: /tmp/hf_cache
          resources:
            limits:
              nvidia.com/gpu: {{ .Values.hiveAiDetection.gpu | quote }}
      volumes:
        - name: hf-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "insurguard.fullname" . }}-hive-ai-detection
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.hiveAiDetection.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: hive-ai-detection
    app.kubernetes.io/instance: {{ .Release.Name }}
